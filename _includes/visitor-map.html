<!-- Visitor Map Section -->
<div id="visitor-map-section" style="margin: 30px 0 10px; padding: 16px 20px; background-color: #f8f9fa; border-radius: 6px;">
  <div style="font-size: 0.8em; color: #999; margin-bottom: 10px; letter-spacing: 0.03em;">VISITOR LOCATIONS</div>

  {% if site.clustrmaps_id and site.clustrmaps_id != "" %}
  <div style="display: flex; justify-content: center; max-width: 500px; margin: 0 auto;">
    <script type="text/javascript" id="clustrmaps"
      src="//clustrmaps.com/map_v2.js?d={{ site.clustrmaps_id }}&cl=ffffff&w=500&t=0">
    </script>
  </div>

  {% elsif site.revolvermaps_id and site.revolvermaps_id != "" %}
  <div style="display: flex; justify-content: center;">
    <script type="text/javascript"
      src="//rf.revolvermaps.com/0/0/8.js?i={{ site.revolvermaps_id }}&m=0&c=ff0000&cr1=ffffff&f=arial&l=33"
      async="async">
    </script>
  </div>

  {% else %}
  <div style="text-align:center; padding: 20px; color: #aaa; font-size: 0.85em; border: 1px dashed #ddd; border-radius: 4px;">
    🗺️ Visitor map will appear here.<br>
    <span style="font-size:0.9em;">
      Add <code>clustrmaps_id</code> to <code>_config.yml</code> —
      get yours free at <a href="https://clustrmaps.com" target="_blank" rel="noopener">clustrmaps.com</a>.
    </span>
  </div>
  {% endif %}
</div>
